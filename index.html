<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

<style>
/* ═══════════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════════ */
:root{
  --bg:#080c14;
  --s1:#0d1420;
  --s2:#111827;
  --s3:#0a1020;
  --b:rgba(56,189,248,.12);
  --cyan:#38bdf8;
  --cdim:rgba(56,189,248,.14);
  --cglow:rgba(56,189,248,.38);
  --gold:#f59e0b;
  --pur:#a78bfa;
  --grn:#34d399;
  --tx:#e2e8f0;
  --mu:#64748b;
  --fd:'Syne',sans-serif;
  --fm:'DM Mono',monospace;
  --fb:'Instrument Sans',sans-serif;
  --r:0.4s cubic-bezier(.4,0,.2,1);
}
html.light{
  --bg:#f1f5f9;--s1:#fff;--s2:#e8edf5;--s3:#f8fafc;
  --b:rgba(14,165,233,.18);
  --tx:#0f172a;--mu:#64748b;
  --cyan:#0ea5e9;--cdim:rgba(14,165,233,.1);--cglow:rgba(14,165,233,.3);
}

/* ═══════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;background:var(--bg);color:var(--tx);font-family:var(--fb);font-size:16px;-webkit-font-smoothing:antialiased;}
body{overflow-x:hidden;}
a{text-decoration:none;color:inherit;}
button{font-family:inherit;cursor:pointer;}
img{display:block;max-width:100%;}

/* ═══════════════════════════════════════════════
   SCROLLBAR & PROGRESS
═══════════════════════════════════════════════ */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:linear-gradient(var(--cyan),var(--pur));border-radius:2px;}
#sp{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--cyan),var(--pur));z-index:999;width:0;box-shadow:0 0 10px var(--cglow);pointer-events:none;}

/* ═══════════════════════════════════════════════
   LAYOUT UTILITIES
═══════════════════════════════════════════════ */
.wrap{max-width:1120px;margin:0 auto;padding:0 24px;}
.grid-bg{
  background-image:linear-gradient(var(--b) 1px,transparent 1px),
                    linear-gradient(90deg,var(--b) 1px,transparent 1px);
  background-size:60px 60px;
}

/* ═══════════════════════════════════════════════
   SCROLL REVEAL
═══════════════════════════════════════════════ */
.rv{opacity:0;transform:translateY(36px);transition:opacity .65s ease,transform .65s ease;}
.rv.left{transform:translateX(-40px);}
.rv.right{transform:translateX(40px);}
.rv.scale{transform:scale(.9);}
.rv.ok{opacity:1!important;transform:none!important;}

/* ═══════════════════════════════════════════════
   KEYFRAMES
═══════════════════════════════════════════════ */
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes spin1{to{transform:rotate(360deg)}}
@keyframes spin2{to{transform:rotate(-360deg)}}
@keyframes photoPulse{
  0%,100%{box-shadow:0 0 0 0 var(--cglow),0 0 30px rgba(56,189,248,.12)}
  50%{box-shadow:0 0 0 8px transparent,0 0 50px rgba(56,189,248,.2)}
}
@keyframes dotPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes scanH{0%{top:0}100%{top:100%}}
@keyframes gradShift{0%,100%{background-position:0 50%}50%{background-position:100% 50%}}
@keyframes wave{0%,100%{transform:rotate(0)}25%{transform:rotate(-12deg)}75%{transform:rotate(12deg)}}
@keyframes slideIn{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:none}}

.fu1{animation:fadeUp .7s .1s ease both;}
.fu2{animation:fadeUp .7s .25s ease both;}
.fu3{animation:fadeUp .7s .4s ease both;}
.fu4{animation:fadeUp .7s .55s ease both;}
.float{animation:float 4s ease-in-out infinite;}
.wave{display:inline-block;animation:wave 2s ease-in-out infinite;}

/* ═══════════════════════════════════════════════
   TYPOGRAPHY
═══════════════════════════════════════════════ */
.sec-label{
  font-family:var(--fm);font-size:.68rem;letter-spacing:.22em;
  color:var(--cyan);text-transform:uppercase;
  display:flex;align-items:center;gap:10px;margin-bottom:.6rem;
}
.sec-label::before{content:'';flex:0 0 28px;height:1px;background:var(--cyan);}
.sec-title{
  font-family:var(--fd);font-size:clamp(1.9rem,5vw,3.2rem);
  font-weight:800;line-height:1.05;color:var(--tx);
}
.shimmer{
  background:linear-gradient(90deg,var(--cyan) 0%,var(--pur) 40%,var(--cyan) 100%);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;animation:shimmer 3s linear infinite;
}
.grad-num{
  font-family:var(--fd);font-size:2.6rem;font-weight:800;line-height:1;
  background:linear-gradient(135deg,var(--cyan),var(--pur));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* ═══════════════════════════════════════════════
   COMPONENTS — BADGE
═══════════════════════════════════════════════ */
.badge{
  display:inline-flex;align-items:center;
  font-family:var(--fm);font-size:.67rem;padding:3px 10px;
  border-radius:99px;background:rgba(56,189,248,.1);
  color:var(--cyan);border:1px solid rgba(56,189,248,.2);white-space:nowrap;
}

/* ═══════════════════════════════════════════════
   COMPONENTS — BUTTONS
═══════════════════════════════════════════════ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  font-family:var(--fm);font-size:.82rem;font-weight:500;letter-spacing:.04em;
  padding:11px 26px;border-radius:8px;border:none;
  transition:transform .2s ease,box-shadow .2s ease,background .2s ease;
  position:relative;overflow:hidden;
}
.btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);
  transform:translateX(-100%);transition:transform .4s;
}
.btn:hover::after{transform:translateX(100%);}
.btn:hover{transform:translateY(-2px);}
.btn-c{background:var(--cyan);color:#08111f;}
.btn-c:hover{background:#7dd3fc;box-shadow:0 0 28px var(--cglow);}
.btn-o{background:transparent;color:var(--cyan);border:1px solid rgba(56,189,248,.35);}
.btn-o:hover{background:var(--cdim);border-color:var(--cyan);box-shadow:0 0 18px var(--cglow);}

/* ═══════════════════════════════════════════════
   GLASS NAVBAR
═══════════════════════════════════════════════ */
.glass{
  background:rgba(8,12,20,.82);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--b);
}
html.light .glass{background:rgba(241,245,249,.88);}
.nav-lnk{
  font-family:var(--fm);font-size:.76rem;color:var(--mu);
  background:none;border:none;padding:4px 0;
  position:relative;transition:color .2s;
}
.nav-lnk::after{
  content:'';position:absolute;bottom:-2px;left:0;
  width:0;height:1px;background:var(--cyan);transition:width .3s;
}
.nav-lnk:hover,.nav-lnk:focus{color:var(--cyan);}
.nav-lnk:hover::after{width:100%;}
.tog{
  width:36px;height:36px;border-radius:50%;background:var(--s2);
  border:1px solid var(--b);display:flex;align-items:center;justify-content:center;
  font-size:.95rem;transition:border-color .2s,transform .3s;
}
.tog:hover{border-color:var(--cyan);transform:rotate(20deg);}

/* ═══════════════════════════════════════════════
   HERO PHOTO
═══════════════════════════════════════════════ */
.photo-wrap{position:relative;width:290px;height:290px;flex-shrink:0;}
.ring1{position:absolute;inset:-18px;border-radius:50%;border:1px dashed rgba(56,189,248,.25);animation:spin1 16s linear infinite;}
.ring2{position:absolute;inset:-9px;border-radius:50%;border:1px solid rgba(56,189,248,.1);animation:spin2 11s linear infinite;}
.photo{width:100%;height:100%;object-fit:cover;object-position:top;border-radius:50%;border:3px solid var(--cyan);animation:photoPulse 3.5s ease-in-out infinite;position:relative;z-index:1;}
.avail{
  position:absolute;bottom:-6px;right:-6px;
  background:var(--s1);border:1px solid var(--b);border-radius:99px;
  padding:6px 14px;display:flex;align-items:center;gap:6px;z-index:2;
}
.avail-dot{width:7px;height:7px;border-radius:50%;background:var(--grn);animation:dotPulse 2s infinite;}

/* ═══════════════════════════════════════════════
   SKILL BARS
═══════════════════════════════════════════════ */
.sbar-bg{height:3px;background:var(--b);border-radius:2px;overflow:hidden;}
.sbar-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--pur));border-radius:2px;width:0;transition:width 1.1s cubic-bezier(.4,0,.2,1);}

/* ═══════════════════════════════════════════════
   PROJECT CARDS
═══════════════════════════════════════════════ */
.pcard{
  background:var(--s1);border:1px solid var(--b);border-radius:16px;
  overflow:hidden;position:relative;
  transition:transform .3s ease,border-color .3s ease,box-shadow .3s ease;
}
.pcard:hover{transform:translateY(-7px);border-color:var(--cyan);box-shadow:0 20px 56px rgba(56,189,248,.13);}
.pcard:hover .ctl,.pcard:hover .cbr{opacity:1;}
.ctlbr{position:absolute;width:16px;height:16px;border-color:var(--cyan);border-style:solid;opacity:.35;transition:opacity .3s;z-index:2;}
.ctlbr.tl{top:10px;left:10px;border-width:1px 0 0 1px;}
.ctlbr.br{bottom:10px;right:10px;border-width:0 1px 1px 0;}
.pimg{height:175px;overflow:hidden;position:relative;}
.pimg img{width:100%;height:100%;object-fit:cover;transition:transform .5s ease,filter .5s ease;filter:brightness(.85);}
.pcard:hover .pimg img{transform:scale(1.07);filter:brightness(1);}
.pimg-fade{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 45%,var(--s1));}
.pcat{position:absolute;top:10px;right:10px;}
.hover-ov{
  position:absolute;inset:0;
  background:linear-gradient(145deg,rgba(8,12,20,.97),rgba(13,20,32,.95));
  opacity:0;transition:opacity .3s;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:22px;
}
.pcard:hover .hover-ov{opacity:1;}

/* ═══════════════════════════════════════════════
   FILTER BUTTONS
═══════════════════════════════════════════════ */
.fbtn{
  font-family:var(--fm);font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;
  padding:7px 16px;border-radius:7px;background:transparent;
  color:var(--mu);border:1px solid var(--b);transition:all .2s;
}
.fbtn.on{background:var(--cyan);color:#08111f;border-color:var(--cyan);box-shadow:0 0 14px var(--cglow);}
.fbtn:not(.on):hover{border-color:var(--cyan);color:var(--cyan);}

/* ═══════════════════════════════════════════════
   TIMELINE
═══════════════════════════════════════════════ */
.tdot{
  width:13px;height:13px;border-radius:50%;background:var(--bg);
  border:2px solid var(--cyan);flex-shrink:0;position:relative;z-index:1;
  animation:dotPulse 3s infinite;
}
.tcard{
  flex:1;background:var(--s2);border:1px solid var(--b);border-radius:12px;
  padding:16px 20px;position:relative;overflow:hidden;
  transition:border-color .3s,box-shadow .3s;
}
.tcard:hover{border-color:var(--cyan);box-shadow:0 4px 20px rgba(56,189,248,.1);}
.scan{
  position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--cyan),transparent);
  animation:scanH 3s linear infinite;opacity:.3;
}

/* ═══════════════════════════════════════════════
   RESUME SECTION
═══════════════════════════════════════════════ */
.rcard{
  background:var(--s1);border:1px solid var(--b);border-radius:14px;
  padding:22px;position:relative;overflow:hidden;
  transition:border-color .3s,box-shadow .3s;
}
.rcard:hover{border-color:var(--cyan);box-shadow:0 6px 28px rgba(56,189,248,.1);}
.rcard-icon{
  width:38px;height:38px;border-radius:9px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;
}

/* ═══════════════════════════════════════════════
   FORM
═══════════════════════════════════════════════ */
.inp{
  width:100%;background:var(--s2);border:1px solid var(--b);border-radius:8px;
  padding:11px 15px;color:var(--tx);font-family:var(--fb);font-size:.9rem;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.inp:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(56,189,248,.1);}
.inp::placeholder{color:var(--mu);}
.inp-label{font-family:var(--fm);font-size:.68rem;color:var(--mu);letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:7px;}

/* ═══════════════════════════════════════════════
   MOBILE
═══════════════════════════════════════════════ */
.mob-menu{
  display:none;position:fixed;inset:0;z-index:90;
  background:rgba(8,12,20,.97);backdrop-filter:blur(24px);
  flex-direction:column;align-items:center;justify-content:center;gap:2.2rem;
}
.mob-menu.open{display:flex;}
html.light .mob-menu{background:rgba(241,245,249,.97);}

@media(max-width:900px){
  .d-nav{display:none!important;}
  .ham{display:flex!important;}
  .hero-row{flex-direction:column-reverse!important;text-align:center;gap:2.5rem!important;}
  .photo-wrap{width:210px!important;height:210px!important;}
  .hero-ctas{justify-content:center!important;}
  .stats-row{justify-content:center!important;}
  .two-col{grid-template-columns:1fr!important;}
}
@media(max-width:640px){
  .proj-grid{grid-template-columns:1fr!important;}
  .sk-grid{grid-template-columns:1fr!important;}
}
</style>
</head>

/* ─── HOOKS ─── */
function useScrollReveal(){
  useEffect(()=>{
    const els=Array.from(document.querySelectorAll('.rv'));
    if(!els.length)return;
    const io=new IntersectionObserver(entries=>{
      entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('ok');});
    },{threshold:.11,rootMargin:'0px 0px -32px 0px'});
    els.forEach(el=>io.observe(el));
    return()=>io.disconnect();
  });
}

function useScrollProgress(){
  useEffect(()=>{
    const bar=document.getElementById('sp');
    const fn=()=>{
      const pct=window.scrollY/(document.body.scrollHeight-window.innerHeight)*100;
      if(bar)bar.style.width=pct+'%';
    };
    window.addEventListener('scroll',fn,{passive:true});
    return()=>window.removeEventListener('scroll',fn);
  },[]);
}

function useInView(threshold=.12){
  const ref=useRef(null);
  const[vis,setVis]=useState(false);
  useEffect(()=>{
    const io=new IntersectionObserver(([e])=>{if(e.isIntersecting)setVis(true);},{threshold});
    if(ref.current)io.observe(ref.current);
    return()=>io.disconnect();
  },[]);
  return[ref,vis];
}

/* ─── ANIMATED COUNTER ─── */
function Counter({val,suf='',dur=1400}){
  const[n,setN]=useState(0);
  const ref=useRef(null);
  useEffect(()=>{
    const io=new IntersectionObserver(([e])=>{
      if(!e.isIntersecting)return;
      io.disconnect();
      const target=parseFloat(val),step=target/(dur/16);
      let cur=0;
      const tick=()=>{
        cur=Math.min(cur+step,target);
        setN(parseFloat(cur.toFixed(1)));
        if(cur<target)requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
    },{threshold:.5});
    if(ref.current)io.observe(ref.current);
    return()=>io.disconnect();
  },[]);
  return <span ref={ref}>{n}{suf}</span>;
}

      <div className="wrap" style={{maxWidth:700,position:'relative'}}>
        <p className="sec-label rv">06. CONNECT</p>
        <h2 className="sec-title rv" style={{marginBottom:'.6rem'}}>Let's <span style={{color:'var(--cyan)'}}>Work Together</span></h2>
        <p className="rv" style={{color:'var(--mu)',marginBottom:'2.8rem',maxWidth:490,fontSize:'.95rem'}}>Open to full-time roles, freelance projects, and exciting collaborations.</p>

        <div className="two-col rv" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
          {[['name','Name','Your name'],['email','Email','your@email.com']].map(([k,l,ph])=>(
            <div key={k}>
              <label className="inp-label" htmlFor={k}>{l}</label>
              <input id={k} className="inp" type={k==='email'?'email':'text'} placeholder={ph} value={form[k]} onChange={upd(k)} autoComplete={k}/>
            </div>
          ))}
        </div>
        <div className="rv" style={{marginBottom:20}}>
          <label className="inp-label" htmlFor="msg">Message</label>
          <textarea id="msg" className="inp" rows={5} placeholder="Tell me about your project or opportunity..." value={form.msg} onChange={upd('msg')} style={{resize:'vertical'}}/>
        </div>
        <button className="btn btn-c rv" onClick={send} style={{width:'100%',padding:'13px',fontSize:'.88rem',justifyContent:'center'}}>
          {sent?'✓ Opening Mail Client…':'✉️ Send Message →'}
        </button>

        <div className="rv" style={{display:'flex',flexWrap:'wrap',gap:18,marginTop:'2.8rem',paddingTop:'2.5rem',borderTop:'1px solid var(--b)'}}>
          {SOCIALS.map(s=>(
            <a key={s.l} href={s.u} target="_blank" rel="noopener noreferrer"
               style={{display:'flex',alignItems:'center',gap:7,fontFamily:'var(--fm)',fontSize:'.75rem',color:'var(--mu)',transition:'color .2s'}}
               onMouseOver={e=>e.currentTarget.style.color='var(--cyan)'}
               onMouseOut={e=>e.currentTarget.style.color='var(--mu)'}>
              <span>{s.i}</span>{s.l}
            </a>
          ))}
        </div>
      </div>
    </section>
  );
}

/* ─── FOOTER ─── */
function Footer(){
  return(
    <footer style={{padding:'24px 24px',background:'var(--s1)',borderTop:'1px solid var(--b)',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}>
      <p style={{fontFamily:'var(--fm)',fontSize:'.7rem',color:'var(--mu)'}}>
        Designed &amp; built by <span style={{color:'var(--cyan)'}}>Chetan Pachauli</span> · 2025 · Ghaziabad, UP
      </p>
      <p style={{fontFamily:'var(--fm)',fontSize:'.68rem',color:'var(--mu)'}}>Made with ❤️ using React</p>
    </footer>
  );
}

/* ─── APP ─── */
function App(){
  const[dark,setDark]=useState(true);
  useScrollProgress();
  useScrollReveal();

  useEffect(()=>{
    document.documentElement.classList.toggle('light',!dark);
  },[dark]);

  // Trigger reveal for elements already in viewport on load/tab-switch
  useEffect(()=>{
    const id=requestAnimationFrame(()=>{
      document.querySelectorAll('.rv:not(.ok)').forEach(el=>{
        const r=el.getBoundingClientRect();
        if(r.top<window.innerHeight*.9)el.classList.add('ok');
      });
    });
    return()=>cancelAnimationFrame(id);
  });

  return(
    <>
      <Navbar dark={dark} setDark={setDark}/>
      <main>
        <Hero dark={dark}/>
        <Skills/>
        <Projects/>
        <Education/>
        <Resume/>
        <Contact/>
      </main>
      <Footer/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
